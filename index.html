<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vulli Narayana Tuitions</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0b1020;
    color:white;
}

header{
    min-height:100vh;
    background:
    linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.65)),
    url("https://images.unsplash.com/photo-1509062522246-3755977927d7?auto=format&fit=crop&w=1600&q=80");
    background-size:cover;
    background-position:center;
}

.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:22px 8%;
    backdrop-filter:blur(14px);
    background:rgba(255,255,255,.08);
    position:fixed;
    width:100%;
    top:0;
    z-index:999;
}

.logo{
    display:flex;
    align-items:center;
    gap:15px;
}

.logo img{
    width:60px;
    height:60px;
    border-radius:50%;
}

.logo h2{
    font-size:22px;
    font-weight:700;
}

.logo p{
    font-size:13px;
    color:#d1d5db;
}

nav ul{
    display:flex;
    list-style:none;
    gap:28px;
}

nav ul li{
    cursor:pointer;
    transition:.3s;
}

nav ul li:hover{
    color:#38bdf8;
}

.hero{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:0 20px;
}

.hero h1{
    font-size:64px;
    font-weight:800;
}

.hero p{
    margin-top:20px;
    font-size:22px;
    color:#e5e7eb;
}

.buttons{
    margin-top:40px;
    display:flex;
    gap:20px;
}

button{
    border:none;
    padding:16px 34px;
    border-radius:50px;
    font-size:17px;
    cursor:pointer;
    transition:.3s;
}

.primary{
    background:#2563eb;
    color:white;
}

.primary:hover{
    transform:translateY(-4px);
}

.secondary{
    background:white;
    color:#111827;
}

.secondary:hover{
    transform:translateY(-4px);
}

</style>

</head>

<body>

<header>

<nav class="navbar">

<div class="logo">

<img src="logo.png" alt="Logo">

<div>

<h2>VULLI NARAYANA TUITIONS</h2>

<p>Tirupati</p>

</div>

</div>

<ul>

<li>Home</li>

<li>About</li>

<li>Courses</li>

<li>Results</li>

<li>Gallery</li>

<li>Contact</li>

</ul>

</nav>

<section class="hero">

<h1>Shaping Bright Futures</h1>

<p>
Admissions Open for 2026–27
</p>

<div class="buttons">

<button class="primary">
Enroll Now
</button>

<button class="secondary">
Call Now
</button>

</div>

</section>

</header>

</body>

</html>
